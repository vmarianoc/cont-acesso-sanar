server {
  listen 80;
  server_name sindico.condar.app;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl http2;
  server_name sindico.condar.app;
  ssl_certificate     /etc/letsencrypt/live/condar.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/condar.app/privkey.pem;

  root /opt/condar/apps/web-sindico/dist;
  index index.html;
  location / { try_files $uri /index.html; }          # SPA fallback
  location ~* \.(js|css|png|svg|woff2?)$ {
    add_header Cache-Control "public, max-age=31536000, immutable";
  }
  location = /sw.js { add_header Cache-Control "no-cache"; }
  location = /firebase-messaging-sw.js { add_header Cache-Control "no-cache"; }
}
