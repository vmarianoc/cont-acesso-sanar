server {
  listen 80;
  server_name api.condar.app;
  location /.well-known/acme-challenge/ { root /var/www/certbot; }
  location / { return 301 https://$host$request_uri; }
}
server {
  listen 443 ssl http2;
  server_name api.condar.app;
  ssl_certificate     /etc/letsencrypt/live/condar.app/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/condar.app/privkey.pem;

  client_max_body_size 30m;   # importação de planilhas/PDF e fotos faciais

  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto https;
    proxy_set_header Host $host;
  }
  # SSE (tempo real): sem buffering, conexão longa
  location /rt/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_set_header Connection '';
    proxy_http_version 1.1;
  }
}
